<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="author" content="Abel Chiwandire" />
  <meta name="description"
    content="StockFolio is a Stock Portfolio tracker that helps indivuals track live market data and monitor their positions." />
  <title>StockFolio | Dashboard</title>

  <!-- Inline theme script to prevent flash -->
  <script>
    (function () {
      // Get current user from localStorage
      const currentUser = localStorage.getItem('currentUser');

      if (currentUser) {
        // Get theme for this user
        const themeKey = 'theme:' + currentUser;
        const theme = localStorage.getItem(themeKey) || 'light';

        // Apply theme to html element immediately
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
        }
      }
    })();
  </script>

  <link rel="stylesheet" href="./css/style.css" />
  <script type="module" src="./js/index.js"></script>
</head>

<body>
  <header id="header" class="header"></header>
  <div class="main-spacer"></div>
  <main>
    <div id="portfolio-summary" class="page-container page-section portfolio-summary shimmer-group"></div>
    <div id="portfolio-container" class="page-container page-section"></div>
    <div id="fallback-root" class="page-container page-section"></div>
  </main>

  <footer id="footer"></footer>
</body>

</html>
